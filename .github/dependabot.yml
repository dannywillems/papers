version: 2
updates:
  # GitHub Actions used in the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Python dependencies of the ADS reference implementation. Add one
  # entry per paper that ships a code/ project.
  - package-ecosystem: "pip"
    directory: "/2026-07-02-authenticated-data-structures/code"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"

  # TypeScript toolchain of the site's runner scripts.
  - package-ecosystem: "npm"
    directory: "/tools/site_assets"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"

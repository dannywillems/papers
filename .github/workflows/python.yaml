name: Python code checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  ads-code:
    name: ADS reference implementation (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: make -C 2026-07-02-authenticated-data-structures/code install

      - name: Run checks
        run: make -C 2026-07-02-authenticated-data-structures/code check

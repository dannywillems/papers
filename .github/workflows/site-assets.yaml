name: Site assets (TypeScript)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  typecheck:
    name: Compile and type-check the site assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/site_assets/package-lock.json

      # tsc runs in strict mode; compiling is the type check.
      - name: Compile (tsc, strict)
        run: make site-assets

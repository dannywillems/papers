name: Lean proofs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  ads-lean:
    name: ADS formalisation (build without sorry, then run demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build and run (no sorry)
        run: make -C 2026-07-02-authenticated-data-structures/lean check

name: Changelog checks

on:
  pull_request:
    types: [assigned, opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  check-changelog:
    name: CHANGELOG.md is updated
    runs-on: ubuntu-latest
    steps:
      - uses: tarides/changelog-check-action@v3
        with:
          changelog: CHANGELOG.md

  check-changelog-commit:
    name: CHANGELOG.md changes are in a dedicated commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download check-commit.sh from toolbox
        run: |
          curl -sSLO \
            https://raw.githubusercontent.com/dannywillems/toolbox/main/changelog/check-commit.sh
          chmod +x check-commit.sh
      - name: Verify CHANGELOG.md changes are in their own commit
        run: ./check-commit.sh "${{ github.event.pull_request.base.sha }}"
